<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Rubik's Cube</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // Create scene
      const scene = new THREE.Scene();

      // Create camera
      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(8, 8, 12);
      camera.lookAt(0, 0, 0);

      // Create renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      // Enhanced lighting setup
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
      keyLight.position.set(10, 10, 10);
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0xffaa66, 0.4);
      fillLight.position.set(-10, 5, -5);
      scene.add(fillLight);

      const backLight = new THREE.DirectionalLight(0xff6699, 0.3);
      backLight.position.set(0, -5, -10);
      scene.add(backLight);

      const rimLight = new THREE.PointLight(0xcc88ff, 0.5);
      rimLight.position.set(-5, 5, -5);
      scene.add(rimLight);

      // Function to create gradient texture
      function createGradientTexture(color1, color2, color3) {
        const canvas = document.createElement("canvas");
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext("2d");

        const gradient = ctx.createLinearGradient(0, 0, 256, 256);
        gradient.addColorStop(0, color1);
        gradient.addColorStop(0.5, color2);
        gradient.addColorStop(1, color3);

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 256, 256);

        return new THREE.CanvasTexture(canvas);
      }

      // Create gradient textures for each face
      const gradients = {
        peachOrange: createGradientTexture("#ffd4a3", "#ffaa66", "#ff8844"),
        orangePink: createGradientTexture("#ffaa66", "#ff6699", "#ff4477"),
        pinkPurple: createGradientTexture("#ff6699", "#cc88ff", "#aa66ff"),
        purpleMagenta: createGradientTexture("#cc88ff", "#dd77ff", "#ff66cc"),
        coralPeach: createGradientTexture("#ff9977", "#ffbb88", "#ffd4a3"),
        lavenderPurple: createGradientTexture("#dd99ff", "#bb88ff", "#9966ff"),
      };

      // Create Rubik's Cube group
      const rubiksCube = new THREE.Group();

      // Create individual cubelets (3x3x3 = 27 small cubes)
      const cubeSize = 0.95;
      const gap = 0.05;
      const spacing = cubeSize + gap;

      for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
          for (let z = -1; z <= 1; z++) {
            // Skip the center cube (hollow)
            if (x === 0 && y === 0 && z === 0) continue;

            const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);

            // Create materials for each face with gradient textures
            const materials = [
              new THREE.MeshStandardMaterial({
                map: x === 1 ? gradients.peachOrange : null,
                color: x === 1 ? 0xffffff : 0x1a1a1a,
                metalness: 0.2,
                roughness: 0.3,
              }),
              new THREE.MeshStandardMaterial({
                map: x === -1 ? gradients.orangePink : null,
                color: x === -1 ? 0xffffff : 0x1a1a1a,
                metalness: 0.2,
                roughness: 0.3,
              }),
              new THREE.MeshStandardMaterial({
                map: y === 1 ? gradients.coralPeach : null,
                color: y === 1 ? 0xffffff : 0x1a1a1a,
                metalness: 0.2,
                roughness: 0.3,
              }),
              new THREE.MeshStandardMaterial({
                map: y === -1 ? gradients.pinkPurple : null,
                color: y === -1 ? 0xffffff : 0x1a1a1a,
                metalness: 0.2,
                roughness: 0.3,
              }),
              new THREE.MeshStandardMaterial({
                map: z === 1 ? gradients.purpleMagenta : null,
                color: z === 1 ? 0xffffff : 0x1a1a1a,
                metalness: 0.2,
                roughness: 0.3,
              }),
              new THREE.MeshStandardMaterial({
                map: z === -1 ? gradients.lavenderPurple : null,
                color: z === -1 ? 0xffffff : 0x1a1a1a,
                metalness: 0.2,
                roughness: 0.3,
              }),
            ];

            const cube = new THREE.Mesh(geometry, materials);
            cube.position.set(x * spacing, y * spacing, z * spacing);
            rubiksCube.add(cube);
          }
        }
      }

      scene.add(rubiksCube);

      // Mouse interaction variables
      let mouseX = 0;
      let mouseY = 0;
      let isHovering = false;
      let targetRotationSpeed = 0.01;
      let currentRotationSpeed = 0.01;

      document.addEventListener("mousemove", (event) => {
        mouseX = (event.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        isHovering = true;
      });

      document.addEventListener("mouseleave", () => {
        isHovering = false;
      });

      // Handle window resize
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Animation variables
      let time = 0;

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);

        time += 0.01;

        // Smooth floating motion
        rubiksCube.position.y = Math.sin(time * 0.5) * 0.3;

        // Hover effects
        if (isHovering) {
          // Speed up rotation on hover
          targetRotationSpeed = 0.025;

          // Interactive rotation based on mouse position
          rubiksCube.rotation.y += mouseX * 0.015;
          rubiksCube.rotation.x += mouseY * 0.015;

          // Enhance lighting on hover
          rimLight.intensity += (1.2 - rimLight.intensity) * 0.1;
          fillLight.intensity += (0.7 - fillLight.intensity) * 0.1;

          // Move rim light with mouse
          rimLight.position.x = mouseX * 10;
          rimLight.position.y = mouseY * 10;

          // Add slight scale pulsing
          const scale = 1 + Math.sin(time * 3) * 0.02;
          rubiksCube.scale.set(scale, scale, scale);
        } else {
          // Slow down rotation
          targetRotationSpeed = 0.01;

          // Reset lighting
          rimLight.intensity += (0.5 - rimLight.intensity) * 0.05;
          fillLight.intensity += (0.4 - fillLight.intensity) * 0.05;

          // Reset rim light position
          rimLight.position.x += (-5 - rimLight.position.x) * 0.05;
          rimLight.position.y += (5 - rimLight.position.y) * 0.05;

          // Reset scale
          const targetScale = 1;
          rubiksCube.scale.x += (targetScale - rubiksCube.scale.x) * 0.05;
          rubiksCube.scale.y += (targetScale - rubiksCube.scale.y) * 0.05;
          rubiksCube.scale.z += (targetScale - rubiksCube.scale.z) * 0.05;
        }

        // Smooth rotation speed transition
        currentRotationSpeed += (targetRotationSpeed - currentRotationSpeed) * 0.05;

        // Constant rotation (like a real Rubik's cube being rotated)
        rubiksCube.rotation.x += currentRotationSpeed * 0.7;
        rubiksCube.rotation.y += currentRotationSpeed;
        rubiksCube.rotation.z += currentRotationSpeed * 0.5;

        // Render scene
        renderer.render(scene, camera);
      }

      // Start animation
      animate();
    </script>
  </body>
</html>
