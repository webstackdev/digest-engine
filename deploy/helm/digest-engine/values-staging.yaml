image:
  repository: ghcr.io/webstackdev/digest-engine
  tag: main
  pullPolicy: IfNotPresent

env:
  debug: "false"
  allowedHosts: "staging.digest-engine.example.com"
  csrfTrustedOrigins: "https://staging.digest-engine.example.com"
  messagingEnabled: "true"
  newsletterPublicUrl: "https://staging.digest-engine.example.com"
  logLevel: INFO

secrets:
  existingSecretName: digest-engine-staging-secrets

jobs:
  seedDemo:
    enabled: false

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
