{{- if .Values.rabbitmq.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "digest-engine.rabbitmqHost" . }}
  labels:
    {{- include "digest-engine.labels" . | nindent 4 }}
spec:
  ports:
    - name: amqp
      port: {{ .Values.rabbitmq.service.port }}
      targetPort: amqp
  selector:
    {{- include "digest-engine.componentLabels" (dict "Release" .Release "Values" .Values "Chart" .Chart "component" "rabbitmq") | nindent 4 }}
{{- end }}
