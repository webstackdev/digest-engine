apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digest-engine.fullname" . }}-taskiq-scheduler
  labels:
    {{- include "digest-engine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.taskiqScheduler.replicaCount }}
  selector:
    matchLabels:
      {{- include "digest-engine.componentLabels" (dict "Release" .Release "Values" .Values "Chart" .Chart "component" "taskiq-scheduler") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "digest-engine.componentLabels" (dict "Release" .Release "Values" .Values "Chart" .Chart "component" "taskiq-scheduler") | nindent 8 }}
    spec:
      containers:
        - name: taskiq-scheduler
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.taskiqScheduler.command | nindent 12 }}
          env:
            - name: BOOTSTRAP_APP
              value: "false"
          envFrom:
            - configMapRef:
                name: {{ include "digest-engine.fullname" . }}-env
            - secretRef:
                name: {{ include "digest-engine.secretName" . }}
          resources:
            {{- toYaml .Values.taskiqScheduler.resources | nindent 12 }}
