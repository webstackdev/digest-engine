image:
  repository: ghcr.io/webstackdev/newsletter-maker
  tag: main
  pullPolicy: IfNotPresent

env:
  debug: "false"
  allowedHosts: "staging.newsletter-maker.example.com"
  csrfTrustedOrigins: "https://staging.newsletter-maker.example.com"
  newsletterApiBaseUrl: "https://staging.newsletter-maker.example.com"
  logLevel: INFO

secrets:
  existingSecretName: newsletter-maker-staging-secrets

jobs:
  seedDemo:
    enabled: false

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack