{{- if .Values.qdrant.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "newsletter-maker.qdrantHost" . }}
  labels:
    {{- include "newsletter-maker.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.qdrant.service.port }}
      targetPort: http
  selector:
    {{- include "newsletter-maker.componentLabels" (dict "Release" .Release "Values" .Values "Chart" .Chart "component" "qdrant") | nindent 4 }}
{{- end }}
