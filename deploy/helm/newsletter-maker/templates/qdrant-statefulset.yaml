{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "newsletter-maker.qdrantHost" . }}
  labels:
    {{- include "newsletter-maker.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "newsletter-maker.qdrantHost" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "newsletter-maker.componentLabels" (dict "Release" .Release "Values" .Values "Chart" .Chart "component" "qdrant") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "newsletter-maker.componentLabels" (dict "Release" .Release "Values" .Values "Chart" .Chart "component" "qdrant") | nindent 8 }}
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.qdrant.service.port }}
              name: http
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes:
          {{- toYaml .Values.qdrant.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
{{- end }}
