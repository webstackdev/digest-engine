{{- if not .Values.secrets.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "newsletter-maker.secretName" . }}
  labels:
    {{- include "newsletter-maker.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  DATABASE_URL: {{ include "newsletter-maker.databaseUrl" . | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  BLUESKY_CREDENTIALS_ENCRYPTION_KEY: {{ .Values.secrets.blueskyCredentialsEncryptionKey | quote }}
  METRICS_TOKEN: {{ .Values.secrets.metricsToken | quote }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  REDDIT_CLIENT_ID: {{ .Values.secrets.redditClientId | quote }}
  REDDIT_CLIENT_SECRET: {{ .Values.secrets.redditClientSecret | quote }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | quote }}
  RESEND_INBOUND_SECRET: {{ .Values.secrets.resendInboundSecret | quote }}
  ANYMAIL_WEBHOOK_SECRET: {{ .Values.secrets.anymailWebhookSecret | quote }}
  DJANGO_SUPERUSER_USERNAME: {{ .Values.secrets.djangoSuperuserUsername | quote }}
  DJANGO_SUPERUSER_EMAIL: {{ .Values.secrets.djangoSuperuserEmail | quote }}
  DJANGO_SUPERUSER_PASSWORD: {{ .Values.secrets.djangoSuperuserPassword | quote }}
{{- end }}
