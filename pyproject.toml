[tool.isort]
# Mode 3 = Vertical Hanging Indent (matches your example)
multi_line_output = 3
# Forces a wrap as soon as you have more than X imports (set to 2 or 1)
force_grid_wrap = 2
# Modern standards (matches 'Black' formatter style)
include_trailing_comma = true
use_parentheses = true

[tool.ruff]
line-length = 120
target-version = "py313"
extend-exclude = ["*/migrations"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["content", "core", "digest_engine", "entities", "ingestion", "messaging", "newsletters", "notifications", "pipeline", "projects", "trends", "users"]

[tool.djlint]
profile = "django"
indent = 4
max_line_length = 120

[tool.mypy]
python_version = "3.13"
plugins = ["mypy_django_plugin.main"]
files = ["conftest.py", "manage.py", "content", "core", "digest_engine", "entities", "ingestion", "messaging", "newsletters", "notifications", "pipeline", "projects", "tests", "trends", "users"]
exclude = [".*/migrations/"]
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "digest_engine.settings"

[tool.coverage.run]
branch = true
source = ["content", "core", "digest_engine", "entities", "ingestion", "messaging", "newsletters", "notifications", "pipeline", "projects", "trends", "users"]
omit = ["*/tests/*", "*/migrations/*"]

[tool.coverage.report]
show_missing = true
omit = ["*/tests/*", "*/migrations/*"]
