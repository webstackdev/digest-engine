x-app-common: &app-common
  image: digest-engine-app:dev
  pull_policy: never
  build:
    context: .
    dockerfile: docker/web/Dockerfile
  env_file:
    - .env
  volumes:
    - .:/app

x-shared-env: &shared-env
  DATABASE_URL: postgresql://newsletter:newsletter@postgres:5432/digest_engine
  RABBITMQ_URL: amqp://digest-engine:digest-engine@rabbitmq:5672/
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333

services:
  django:
    <<: *app-common
    environment:
      BOOTSTRAP_APP: "true"
      <<: *shared-env
    command:
      [
        "gunicorn",
        "digest_engine.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "2",
        "--reload",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 5

  taskiq-worker:
    <<: *app-common
    environment:
      BOOTSTRAP_APP: "false"
      <<: *shared-env
    command:
      [
        "watchmedo",
        "auto-restart",
        "--directory=.",
        "--pattern=*.py",
        "--recursive",
        "--",
        "taskiq",
        "worker",
        "digest_engine.taskiq:broker",
        "--fs-discover",
        "--log-level",
        "INFO",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  taskiq-scheduler:
    <<: *app-common
    environment:
      BOOTSTRAP_APP: "false"
      <<: *shared-env
    command:
      [
        "sh",
        "-lc",
        'skip_flag=''''; if [ "$${TASKIQ_SCHEDULER_SKIP_FIRST_RUN:-true}" = "true" ]; then skip_flag=''--skip-first-run''; fi; exec watchmedo auto-restart --directory=. --pattern=*.py --recursive -- taskiq scheduler digest_engine.taskiq:scheduler --fs-discover --log-level INFO $${skip_flag}',
      ]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: digest_engine
      POSTGRES_USER: newsletter
      POSTGRES_PASSWORD: newsletter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsletter -d digest_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-alpine
    environment:
      RABBITMQ_DEFAULT_USER: digest-engine
      RABBITMQ_DEFAULT_PASS: digest-engine
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage

  nginx:
    image: nginx:alpine
    depends_on:
      django:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command:
      [
        "sh",
        "-lc",
        "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000",
      ]
    env_file:
      - .env
    environment:
      NEWSLETTER_API_INTERNAL_URL: http://nginx
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      nginx:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:
  frontend_node_modules:
